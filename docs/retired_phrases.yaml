  # Round-10 entry — catches reintroduction of the retired phrasing that
  # claimed unsteady cfg "KEEPS MACH_NUMBER = 0.0064 for SU2's
  # nondimensionalization". Under HIGH-12 Round-9, unsteady cfg uses
  # MACH = 1e-9 + FREESTREAM_OPTION = FREESTREAM_VELOCITY override. The
  # 0.0064 value is correct for STEADY tiers (Tier -1 / Tier 0 use V_tip
  # as freestream); the regex is tightened to require both the verb KEEPS
  # and the literal 0.0064 within the same line so steady-context uses
  # don't trip.
  - pattern: 'KEEPS\s+MACH_NUMBER\s*=\s*0\.0064'
    retired_by: 'HIGH-12 Round-9 unsteady MACH = 1e-9 + FREESTREAM_OPTION override'
    allow_list_sections:
      - 'revision history'
      - 'appendix'
    allow_list_disclaimers:
      - 'earlier draft'
      - 'retired by HIGH-12'
      - 'is retired'
      - 'pre-HIGH-12'
      - 'no longer'

# ─────────────────────────────────────────────────────────────────────
# Maintenance policy (Round 9 lock):
# When a new review round retires an architectural pattern:
#   1. Add a new entry to this file with the regex, retired_by, and allow-lists.
#   2. Run tests/test_audit/test_no_stale_architecture_refs.py to verify the
#      catalog entry doesn't false-positive on current spec (false positives =
#      regex too broad; tune the pattern or widen the allow_list).
#   3. Commit spec edits AND catalog entry in the same PR.
# See docs/review_process.md §4 for the full procedure.
