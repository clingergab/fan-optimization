# Retired-Phrase Regex Inventory
#
# Catalog of architectural phrases retired across review rounds. Each entry
# names the regex pattern, the lock that replaced the phrase, and an allow-list
# of contexts where the phrase may still legally appear (revision history,
# CI-gate descriptions, explicit "earlier draft" historical notes).
#
# Schema (Round-9 lock):
#   - pattern: Python regex
#     retired_by: round + lock that replaced the phrase
#     allow_list_sections:   markdown section headings where matches are allowed
#                            (matched as substring against the line's nearest
#                            preceding heading, case-insensitive)
#     allow_list_disclaimers: phrases that, if present on the matching line,
#                             mark the match as a legitimate historical reference
#                             (case-insensitive)
#
# Consumed by `tests/test_audit/test_no_stale_architecture_refs.py` which scans
# `docs/report-final.md` + `src/fanopt/**/*.py` and fails on any match outside
# both allow-lists.
#
# Maintenance: every review round that retires an architectural pattern adds an
# entry here BEFORE the prose edits land. See docs/review_process.md §4.

retired_phrases:

  # ─────────────────────────────────────────────────────────────────────
